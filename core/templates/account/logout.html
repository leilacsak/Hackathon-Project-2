{% extends "core/base.html" %}

{% block title %}Logout{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="py-3 py-md-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7 col-xl-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5 text-center">
          <h1 class="h3 mb-2">Log Out</h1>
          <p class="text-muted mb-4">Are you sure you want to log out of SetPoint?</p>

          <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
              <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
            {% endif %}

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success btn-glow py-2">Yes, log me out</button>
              <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-glow py-2">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
