{% extends "core/base.html" %}

{% block title %}Book a Court{% endblock %}

{% block content %}
<h1 class="mb-4">Book a Court</h1>
<div class="card card-soft">
  <div class="card-body p-4">
    <form method="post" class="row g-3">
      {% csrf_token %}
      {% for field in form %}
        <div class="col-md-6">
          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <div class="col-12">
        <button type="submit" class="btn btn-accent">Confirm Booking</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
