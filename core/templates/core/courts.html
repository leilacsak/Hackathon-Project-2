{% extends "core/base.html" %}

{% block title %}Courts{% endblock %}

{% block content %}
<h1 class="mb-4">Available Courts</h1>
<div class="row g-3">
  {% for court in courts %}
    <div class="col-sm-6 col-lg-3">
      <article class="card card-soft h-100">
        <div class="card-body">
          <h2 class="h5">Court {{ court.number }}</h2>
          <p class="mb-1"><strong>Surface:</strong> {{ court.surface }}</p>
          <p class="mb-0"><strong>Type:</strong> {% if court.indoors %}Indoor{% else %}Outdoor{% endif %}</p>
        </div>
      </article>
    </div>
  {% endfor %}
</div>
{% endblock %}
